services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: psp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 10"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: psp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: psp-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -ec
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic poll.created --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic vote.cast --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic vote.removed --replication-factor 1 --partitions 3
    restart: "no"

  auth-postgres:
    image: postgres:16-alpine
    container_name: psp-auth-postgres
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-auth-migrate
    volumes:
      - ./back/services/auth-service/migrations:/migrations
    depends_on:
      auth-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@auth-postgres:5432/auth_service?sslmode=disable
      - up
    restart: "no"

  auth-service:
    container_name: psp-auth-service
    build:
      context: ./back
      dockerfile: services/auth-service/Dockerfile
    env_file:
      - ./back/services/auth-service/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@auth-postgres:5432/auth_service?sslmode=disable
    ports:
      - "50051:50051"
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  poll-postgres:
    image: postgres:16-alpine
    container_name: psp-poll-postgres
    environment:
      POSTGRES_DB: poll_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - poll_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poll_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  poll-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-poll-migrate
    volumes:
      - ./back/services/poll-service/migrations:/migrations
    depends_on:
      poll-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@poll-postgres:5432/poll_service?sslmode=disable
      - up
    restart: "no"

  poll-service:
    container_name: psp-poll-service
    build:
      context: ./back
      dockerfile: services/poll-service/Dockerfile
    env_file:
      - ./back/services/poll-service/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@poll-postgres:5432/poll_service?sslmode=disable
      AUTH_GRPC_ENDPOINT: auth-service:50051
      EVENT_PUBLISHER: kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_WRITE_TIMEOUT: 5s
    ports:
      - "50052:50052"
    depends_on:
      poll-postgres:
        condition: service_healthy
      poll-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  vote-postgres:
    image: postgres:16-alpine
    container_name: psp-vote-postgres
    environment:
      POSTGRES_DB: vote_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - vote_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vote_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  vote-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-vote-migrate
    volumes:
      - ./back/services/vote-service/migrations:/migrations
    depends_on:
      vote-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@vote-postgres:5432/vote_service?sslmode=disable
      - up
    restart: "no"

  vote-service:
    container_name: psp-vote-service
    build:
      context: ./back
      dockerfile: services/vote-service/Dockerfile
    env_file:
      - ./back/services/vote-service/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@vote-postgres:5432/vote_service?sslmode=disable
      AUTH_GRPC_ENDPOINT: auth-service:50051
      POLL_GRPC_ENDPOINT: poll-service:50052
      EVENT_PUBLISHER: kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_WRITE_TIMEOUT: 5s
    ports:
      - "50053:50053"
    depends_on:
      vote-postgres:
        condition: service_healthy
      vote-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      poll-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  feed-postgres:
    image: postgres:16-alpine
    container_name: psp-feed-postgres
    environment:
      POSTGRES_DB: feed_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - feed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feed_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  feed-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-feed-migrate
    volumes:
      - ./back/services/feed-service/migrations:/migrations
    depends_on:
      feed-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@feed-postgres:5432/feed_service?sslmode=disable
      - up
    restart: "no"

  feed-service:
    container_name: psp-feed-service
    build:
      context: ./back
      dockerfile: services/feed-service/Dockerfile
    env_file:
      - ./back/services/feed-service/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@feed-postgres:5432/feed_service?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_GROUP_ID: feed-service
    ports:
      - "50054:50054"
    depends_on:
      feed-postgres:
        condition: service_healthy
      feed-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api-service:
    container_name: psp-api-service
    build:
      context: ./back
      dockerfile: services/api-service/Dockerfile
    env_file:
      - ./back/services/api-service/.env
    environment:
      AUTH_GRPC_ENDPOINT: auth-service:50051
      POLL_GRPC_ENDPOINT: poll-service:50052
      VOTE_GRPC_ENDPOINT: vote-service:50053
      FEED_GRPC_ENDPOINT: feed-service:50054
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - poll-service
      - vote-service
      - feed-service
    restart: unless-stopped

volumes:
  auth_postgres_data:
  poll_postgres_data:
  vote_postgres_data:
  feed_postgres_data: