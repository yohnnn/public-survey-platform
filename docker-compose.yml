services:
  redis:
    image: redis:7-alpine
    container_name: psp-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: psp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 10"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: psp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: psp-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -ec
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic poll.created --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic poll.updated --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic poll.deleted --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic vote.cast --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic vote.removed --replication-factor 1 --partitions 3
    restart: "no"

  auth-postgres:
    image: postgres:16-alpine
    container_name: psp-auth-postgres
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-auth-migrate
    volumes:
      - ./back/services/auth-service/migrations:/migrations
    depends_on:
      auth-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@auth-postgres:5432/auth_service?sslmode=disable
      - up
    restart: "no"

  auth-service:
    container_name: psp-auth-service
    build:
      context: ./back
      dockerfile: services/auth-service/Dockerfile
    environment:
      GRPC_ADDR: :50051
      DATABASE_URL: postgres://postgres:postgres@auth-postgres:5432/auth_service?sslmode=disable
      JWT_SECRET: change-me-super-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      BCRYPT_COST: 12
    ports:
      - "50051:50051"
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  poll-postgres:
    image: postgres:16-alpine
    container_name: psp-poll-postgres
    environment:
      POSTGRES_DB: poll_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - poll_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poll_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  poll-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-poll-migrate
    volumes:
      - ./back/services/poll-service/migrations:/migrations
    depends_on:
      poll-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@poll-postgres:5432/poll_service?sslmode=disable
      - up
    restart: "no"

  poll-service:
    container_name: psp-poll-service
    build:
      context: ./back
      dockerfile: services/poll-service/Dockerfile
    environment:
      GRPC_ADDR: :50052
      DATABASE_URL: postgres://postgres:postgres@poll-postgres:5432/poll_service?sslmode=disable
      AUTH_GRPC_ENDPOINT: auth-service:50051
      REDIS_ADDR: redis:6379
      OUTBOX_RELAY_INTERVAL: 1s
      OUTBOX_RELAY_BATCH_SIZE: 100
      EVENT_PUBLISHER: kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_READ_TIMEOUT: 10s
      KAFKA_COMMIT_PERIOD: 1s
      KAFKA_GROUP_ID: poll-service
      KAFKA_WRITE_TIMEOUT: 5s
    ports:
      - "50052:50052"
    depends_on:
      poll-postgres:
        condition: service_healthy
      poll-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  vote-postgres:
    image: postgres:16-alpine
    container_name: psp-vote-postgres
    environment:
      POSTGRES_DB: vote_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - vote_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vote_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  vote-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-vote-migrate
    volumes:
      - ./back/services/vote-service/migrations:/migrations
    depends_on:
      vote-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@vote-postgres:5432/vote_service?sslmode=disable
      - up
    restart: "no"

  vote-service:
    container_name: psp-vote-service
    build:
      context: ./back
      dockerfile: services/vote-service/Dockerfile
    environment:
      GRPC_ADDR: :50053
      DATABASE_URL: postgres://postgres:postgres@vote-postgres:5432/vote_service?sslmode=disable
      AUTH_GRPC_ENDPOINT: auth-service:50051
      POLL_GRPC_ENDPOINT: poll-service:50052
      OUTBOX_RELAY_INTERVAL: 1s
      OUTBOX_RELAY_BATCH_SIZE: 100
      EVENT_PUBLISHER: kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_WRITE_TIMEOUT: 5s
    ports:
      - "50053:50053"
    depends_on:
      vote-postgres:
        condition: service_healthy
      vote-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      poll-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  feed-postgres:
    image: postgres:16-alpine
    container_name: psp-feed-postgres
    environment:
      POSTGRES_DB: feed_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - feed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feed_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  feed-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-feed-migrate
    volumes:
      - ./back/services/feed-service/migrations:/migrations
    depends_on:
      feed-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@feed-postgres:5432/feed_service?sslmode=disable
      - up
    restart: "no"

  feed-service:
    container_name: psp-feed-service
    build:
      context: ./back
      dockerfile: services/feed-service/Dockerfile
    environment:
      GRPC_ADDR: :50054
      DATABASE_URL: postgres://postgres:postgres@feed-postgres:5432/feed_service?sslmode=disable
      AUTH_GRPC_ENDPOINT: auth-service:50051
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_READ_TIMEOUT: 10s
      KAFKA_COMMIT_PERIOD: 1s
      KAFKA_GROUP_ID: feed-service
    ports:
      - "50054:50054"
    depends_on:
      feed-postgres:
        condition: service_healthy
      feed-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  analytics-postgres:
    image: postgres:16-alpine
    container_name: psp-analytics-postgres
    environment:
      POSTGRES_DB: analytics_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  analytics-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-analytics-migrate
    volumes:
      - ./back/services/analytics-service/migrations:/migrations
    depends_on:
      analytics-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@analytics-postgres:5432/analytics_service?sslmode=disable
      - up
    restart: "no"

  analytics-service:
    container_name: psp-analytics-service
    build:
      context: ./back
      dockerfile: services/analytics-service/Dockerfile
    environment:
      GRPC_ADDR: :50055
      DATABASE_URL: postgres://postgres:postgres@analytics-postgres:5432/analytics_service?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_READ_TIMEOUT: 10s
      KAFKA_COMMIT_PERIOD: 1s
      KAFKA_GROUP_ID: analytics-service
    ports:
      - "50055:50055"
    depends_on:
      analytics-postgres:
        condition: service_healthy
      analytics-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api-service:
    container_name: psp-api-service
    build:
      context: ./back
      dockerfile: services/api-service/Dockerfile
    environment:
      HTTP_ADDR: :8080
      HTTP_PORT: 8080
      AUTH_GRPC_ENDPOINT: auth-service:50051
      POLL_GRPC_ENDPOINT: poll-service:50052
      VOTE_GRPC_ENDPOINT: vote-service:50053
      FEED_GRPC_ENDPOINT: feed-service:50054
      ANALYTICS_GRPC_ENDPOINT: analytics-service:50055
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8082,http://127.0.0.1:8082
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - poll-service
      - vote-service
      - feed-service
      - analytics-service
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: psp-swagger-ui
    environment:
      SWAGGER_JSON: /openapi/openapi.yml
      TRY_IT_OUT_ENABLED: "true"
    volumes:
      - ./back/services/api-service/api/openapi.yml:/openapi/openapi.yml:ro
    ports:
      - "8082:8080"
    depends_on:
      api-service:
        condition: service_started
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: psp-cadvisor
    command:
      - --housekeeping_interval=30s
      - --docker_only=false
      - --store_container_labels=true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"
    privileged: true
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: psp-node-exporter
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro
    ports:
      - "9100:9100"
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: psp-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: psp-blackbox-exporter
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    ports:
      - "9115:9115"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: psp-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor
      - node-exporter
      - redis-exporter
      - blackbox-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: psp-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  auth_postgres_data:
  poll_postgres_data:
  vote_postgres_data:
  feed_postgres_data:
  analytics_postgres_data:
  prometheus_data:
  grafana_data:
