services:
  redis:
    image: redis:7-alpine
    container_name: psp-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: psp-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: psp-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo "waiting for minio...";
        sleep 1;
      done &&
      mc mb --ignore-existing local/poll-images &&
      mc anonymous set download local/poll-images
      '
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: psp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 10"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: psp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: psp-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -ec
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic poll.created --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic poll.updated --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic poll.deleted --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic vote.cast --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic vote.removed --replication-factor 1 --partitions 3
    restart: "no"

  user-postgres:
    image: postgres:16-alpine
    container_name: psp-user-postgres
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  user-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-user-migrate
    volumes:
      - ./back/services/user-service/migrations:/migrations
    depends_on:
      user-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@user-postgres:5432/auth_service?sslmode=disable
      - up
    restart: "no"

  user-service:
    container_name: psp-user-service
    build:
      context: ./back
      dockerfile: services/user-service/Dockerfile
    environment:
      GRPC_ADDR: :50051
      DATABASE_URL: postgres://postgres:postgres@user-postgres:5432/auth_service?sslmode=disable
      JWT_SECRET: change-me-super-secret
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      BCRYPT_COST: 12
    ports:
      - "50051:50051"
    depends_on:
      user-postgres:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  poll-postgres:
    image: postgres:16-alpine
    container_name: psp-poll-postgres
    environment:
      POSTGRES_DB: poll_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - poll_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poll_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  poll-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-poll-migrate
    volumes:
      - ./back/services/poll-service/migrations:/migrations
    depends_on:
      poll-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@poll-postgres:5432/poll_service?sslmode=disable
      - up
    restart: "no"

  poll-service:
    container_name: psp-poll-service
    build:
      context: ./back
      dockerfile: services/poll-service/Dockerfile
    environment:
      GRPC_ADDR: :50052
      DATABASE_URL: postgres://postgres:postgres@poll-postgres:5432/poll_service?sslmode=disable
      USER_GRPC_ENDPOINT: user-service:50051
      REDIS_ADDR: redis:6379
      OUTBOX_RELAY_INTERVAL: 1s
      OUTBOX_RELAY_BATCH_SIZE: 100
      EVENT_PUBLISHER: kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_READ_TIMEOUT: 10s
      KAFKA_COMMIT_PERIOD: 1s
      KAFKA_GROUP_ID: poll-service
      KAFKA_WRITE_TIMEOUT: 5s
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: poll-images
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_BASE_URL: http://localhost:9000/poll-images
      MINIO_PRESIGN_TTL: 15m
      MINIO_MAX_FILE_BYTES: 10485760
    ports:
      - "50052:50052"
    depends_on:
      poll-postgres:
        condition: service_healthy
      poll-migrate:
        condition: service_completed_successfully
      user-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  vote-postgres:
    image: postgres:16-alpine
    container_name: psp-vote-postgres
    environment:
      POSTGRES_DB: vote_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - vote_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vote_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  vote-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-vote-migrate
    volumes:
      - ./back/services/vote-service/migrations:/migrations
    depends_on:
      vote-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@vote-postgres:5432/vote_service?sslmode=disable
      - up
    restart: "no"

  vote-service:
    container_name: psp-vote-service
    build:
      context: ./back
      dockerfile: services/vote-service/Dockerfile
    environment:
      GRPC_ADDR: :50053
      DATABASE_URL: postgres://postgres:postgres@vote-postgres:5432/vote_service?sslmode=disable
      USER_GRPC_ENDPOINT: user-service:50051
      POLL_GRPC_ENDPOINT: poll-service:50052
      OUTBOX_RELAY_INTERVAL: 1s
      OUTBOX_RELAY_BATCH_SIZE: 100
      EVENT_PUBLISHER: kafka
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_WRITE_TIMEOUT: 5s
    ports:
      - "50053:50053"
    depends_on:
      vote-postgres:
        condition: service_healthy
      vote-migrate:
        condition: service_completed_successfully
      user-service:
        condition: service_started
      poll-service:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  feed-postgres:
    image: postgres:16-alpine
    container_name: psp-feed-postgres
    environment:
      POSTGRES_DB: feed_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - feed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feed_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  feed-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-feed-migrate
    volumes:
      - ./back/services/feed-service/migrations:/migrations
    depends_on:
      feed-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@feed-postgres:5432/feed_service?sslmode=disable
      - up
    restart: "no"

  feed-service:
    container_name: psp-feed-service
    build:
      context: ./back
      dockerfile: services/feed-service/Dockerfile
    environment:
      GRPC_ADDR: :50054
      DATABASE_URL: postgres://postgres:postgres@feed-postgres:5432/feed_service?sslmode=disable
      USER_GRPC_ENDPOINT: user-service:50051
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_READ_TIMEOUT: 10s
      KAFKA_COMMIT_PERIOD: 1s
      KAFKA_GROUP_ID: feed-service
    ports:
      - "50054:50054"
    depends_on:
      feed-postgres:
        condition: service_healthy
      feed-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  analytics-postgres:
    image: postgres:16-alpine
    container_name: psp-analytics-postgres
    environment:
      POSTGRES_DB: analytics_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics_service"]
      interval: 5s
      timeout: 3s
      retries: 20

  analytics-migrate:
    image: migrate/migrate:v4.18.3
    container_name: psp-analytics-migrate
    volumes:
      - ./back/services/analytics-service/migrations:/migrations
    depends_on:
      analytics-postgres:
        condition: service_healthy
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@analytics-postgres:5432/analytics_service?sslmode=disable
      - up
    restart: "no"

  analytics-service:
    container_name: psp-analytics-service
    build:
      context: ./back
      dockerfile: services/analytics-service/Dockerfile
    environment:
      GRPC_ADDR: :50055
      DATABASE_URL: postgres://postgres:postgres@analytics-postgres:5432/analytics_service?sslmode=disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_PREFIX: ""
      KAFKA_READ_TIMEOUT: 10s
      KAFKA_COMMIT_PERIOD: 1s
      KAFKA_GROUP_ID: analytics-service
    ports:
      - "50055:50055"
    depends_on:
      analytics-postgres:
        condition: service_healthy
      analytics-migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api-service:
    container_name: psp-api-service
    build:
      context: ./back
      dockerfile: services/api-service/Dockerfile
    environment:
      HTTP_ADDR: :8080
      HTTP_PORT: 8080
      USER_GRPC_ENDPOINT: user-service:50051
      POLL_GRPC_ENDPOINT: poll-service:50052
      VOTE_GRPC_ENDPOINT: vote-service:50053
      FEED_GRPC_ENDPOINT: feed-service:50054
      ANALYTICS_GRPC_ENDPOINT: analytics-service:50055
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:8082,http://127.0.0.1:8082
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - poll-service
      - vote-service
      - feed-service
      - analytics-service
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: psp-swagger-ui
    environment:
      SWAGGER_JSON: /openapi/openapi.yml
      TRY_IT_OUT_ENABLED: "true"
    volumes:
      - ./back/services/api-service/api/openapi.yml:/openapi/openapi.yml:ro
    ports:
      - "8082:8080"
    depends_on:
      api-service:
        condition: service_started
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
  auth_postgres_data:
  poll_postgres_data:
  vote_postgres_data:
  feed_postgres_data:
  analytics_postgres_data:
